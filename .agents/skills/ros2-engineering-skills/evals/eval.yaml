---
# Skills 2.0 Evaluation Configuration
# Defines test cases for automated quality verification of ros2-engineering-skills
#
# Each eval runs a prompt through the skill and compares the output
# against expected criteria. Results include:
#   - pass_rate: percentage of criteria met
#   - execution_time_ms: wall-clock time
#   - token_count: approximate tokens consumed

skill: ros2-engineering-skills
version: 1.1.0
classification: capability
deprecation-risk: medium

evals:
  - name: qos-compatibility-analysis
    description: >
      Validates that the skill correctly identifies QoS incompatibilities
      and provides actionable DDS-compliant suggestions.
    prompt: prompts/qos-compatibility.md
    expected: expected/qos-compatibility.md
    criteria:
      - id: identify-incompatibility
        description: "Must correctly identify QoS incompatibility between BEST_EFFORT publisher and RELIABLE subscriber"
        weight: 1.0
      - id: explain-rxo
        description: "Must explain DDS RxO (Request-vs-Offered) semantics"
        weight: 0.8
      - id: suggest-fix
        description: "Must suggest switching subscriber to BEST_EFFORT or publisher to RELIABLE"
        weight: 1.0
    timeout: 60000
    tags: [qos, dds, communication]

  - name: package-scaffolding
    description: >
      Validates that the skill generates correct ROS 2 package structures
      following all naming conventions and dependency declarations.
    prompt: prompts/package-creation.md
    expected: expected/package-creation.md
    criteria:
      - id: correct-structure
        description: "Must generate valid ROS 2 package with correct directory structure"
        weight: 1.0
      - id: naming-conventions
        description: "Must follow snake_case naming conventions"
        weight: 0.8
      - id: lifecycle-support
        description: "Must include lifecycle node support for C++ packages"
        weight: 0.8
      - id: dependency-declarations
        description: "Must declare all dependencies in package.xml format 3"
        weight: 1.0
    timeout: 60000
    tags: [package, scaffolding, build]

  - name: launch-file-review
    description: >
      Validates that the skill detects common launch file issues including
      missing functions, deprecated keywords, and anti-patterns.
    prompt: prompts/launch-validation.md
    expected: expected/launch-validation.md
    criteria:
      - id: detect-missing-function
        description: "Must detect missing generate_launch_description function"
        weight: 1.0
      - id: flag-deprecated-keywords
        description: "Must flag deprecated keywords (node_executable, node_name)"
        weight: 0.8
      - id: warn-hardcoded-paths
        description: "Must warn about hardcoded paths"
        weight: 0.6
      - id: identify-duplicate-names
        description: "Must identify duplicate node names"
        weight: 0.8
    timeout: 60000
    tags: [launch, validation, static-analysis]

  - name: lifecycle-node-design
    description: >
      Validates that the skill recommends lifecycle nodes for hardware drivers
      and correctly describes state transitions and error handling.
    prompt: prompts/lifecycle-design.md
    expected: expected/lifecycle-design.md
    criteria:
      - id: recommend-lifecycle
        description: "Must recommend lifecycle node for hardware driver"
        weight: 1.0
      - id: describe-transitions
        description: "Must describe state transitions (unconfigured -> inactive -> active)"
        weight: 0.8
      - id: error-handling
        description: "Must include error handling with on_error callback"
        weight: 0.8
      - id: safe-shutdown
        description: "Must implement safe shutdown in on_deactivate"
        weight: 1.0
    timeout: 60000
    tags: [lifecycle, hardware, safety]

  - name: rosbag2-playback-qos
    description: >
      Validates that the skill correctly analyzes rosbag2 metadata for QoS
      profiles and identifies playback compatibility issues.
    prompt: prompts/rosbag2-playback.md
    expected: expected/rosbag2-playback.md
    criteria:
      - id: parse-metadata
        description: "Must parse rosbag2 metadata for QoS profiles"
        weight: 1.0
      - id: transient-local-warning
        description: "Must identify TRANSIENT_LOCAL playback issues"
        weight: 0.8
      - id: recommend-queue-size
        description: "Must recommend --read-ahead-queue-size for large bags"
        weight: 0.6
    timeout: 60000
    tags: [rosbag2, playback, qos]

  - name: sros2-security-config
    description: >
      Validates that the skill correctly configures SROS2 security artifacts,
      DDS security plugins, and least-privilege policies for production deployment.
    prompt: prompts/sros2-security.md
    expected: expected/sros2-security.md
    criteria:
      - id: keystore-enclave-cli
        description: "Must generate correct SROS2 keystore and enclave CLI commands"
        weight: 1.0
      - id: enforce-strategy
        description: "Must set ROS_SECURITY_STRATEGY=Enforce for production"
        weight: 1.0
      - id: least-privilege-policy
        description: "Must apply least-privilege policy for safety_monitor (subscribe-only except /e_stop)"
        weight: 1.0
      - id: dds-security-plugins
        description: "Must configure all three DDS security plugins"
        weight: 0.8
    timeout: 60000
    tags: [sros2, security, dds, production]

  - name: multi-robot-fleet-design
    description: >
      Validates that the skill designs a correct multi-robot fleet architecture
      with proper DDS discovery isolation, namespacing, and tf conventions.
    prompt: prompts/multi-robot-fleet.md
    expected: expected/multi-robot-fleet.md
    criteria:
      - id: discovery-isolation
        description: "Must address DDS discovery isolation between robots"
        weight: 1.0
      - id: namespace-strategy
        description: "Must define namespace strategy with per-robot prefixes"
        weight: 1.0
      - id: tf-frame-conventions
        description: "Must handle tf frame conventions for multi-robot (frame_prefix)"
        weight: 0.8
      - id: fleet-manager-pattern
        description: "Must describe fleet manager communication pattern"
        weight: 0.8
    timeout: 60000
    tags: [multi-robot, fleet, dds, namespace, nav2]

  - name: micro-ros-firmware-design
    description: >
      Validates that the skill correctly outlines micro-ROS firmware using rclc,
      static memory allocation, XRCE-DDS agent setup, and reconnection handling.
    prompt: prompts/micro-ros-firmware.md
    expected: expected/micro-ros-firmware.md
    criteria:
      - id: rclc-api-usage
        description: "Must use rclc API correctly (not rclcpp/rclpy)"
        weight: 1.0
      - id: static-memory-allocation
        description: "Must configure static memory allocation (no dynamic malloc in publish loop)"
        weight: 1.0
      - id: xrce-dds-agent
        description: "Must include XRCE-DDS agent setup and connection parameters"
        weight: 0.8
      - id: reconnection-strategy
        description: "Must handle agent disconnection with reconnection strategy"
        weight: 0.8
    timeout: 60000
    tags: [micro-ros, firmware, rclc, xrce-dds, embedded]

  - name: python-package-scaffolding
    description: >
      Validates that the skill generates correct ROS 2 Python package structures
      with ament_python build type, proper entry points, and QoS-aware subscriptions.
    prompt: prompts/python-package.md
    expected: expected/python-package.md
    criteria:
      - id: correct-structure
        description: "Must generate valid ament_python package with setup.py, setup.cfg, and resource marker"
        weight: 1.0
      - id: qos-sensor-profile
        description: "Must use qos_profile_sensor_data for sensor subscriptions, not integer depth"
        weight: 1.0
      - id: parameter-declaration
        description: "Must declare parameters with typed defaults using declare_parameter"
        weight: 0.8
      - id: launch-file
        description: "Must include Python launch file with parameter loading"
        weight: 0.8
      - id: pytest-tests
        description: "Must include pytest-based test file"
        weight: 0.6
    timeout: 60000
    tags: [package, python, ament_python, qos]

  - name: nav2-stack-configuration
    description: >
      Validates that the skill correctly configures the Nav2 navigation stack
      with AMCL, costmaps, DWB controller, and behavior tree recovery.
    prompt: prompts/nav2-configuration.md
    expected: expected/nav2-configuration.md
    criteria:
      - id: amcl-config
        description: "Must configure AMCL with correct robot model type and laser model"
        weight: 1.0
      - id: costmap-layers
        description: "Must configure global and local costmaps with correct layers and robot footprint"
        weight: 1.0
      - id: controller-params
        description: "Must set DWB controller velocity limits matching robot specs"
        weight: 0.8
      - id: recovery-behaviors
        description: "Must configure recovery behaviors (spin, backup, wait)"
        weight: 0.8
      - id: launch-file
        description: "Must provide a launch file with map argument and use_sim_time"
        weight: 0.6
    timeout: 70000
    tags: [nav2, navigation, costmap, amcl, behavior-tree]

  - name: ros2-control-hardware-interface
    description: >
      Validates that the skill correctly implements a ros2_control SystemInterface
      plugin with serial communication, lifecycle callbacks, and controller configuration.
    prompt: prompts/ros2-control-hardware.md
    expected: expected/ros2-control-hardware.md
    criteria:
      - id: system-interface
        description: "Must implement SystemInterface with read/write/export methods"
        weight: 1.0
      - id: lifecycle-callbacks
        description: "Must implement on_configure, on_activate, on_deactivate, on_cleanup"
        weight: 1.0
      - id: error-handling
        description: "Must handle serial failures with return_type::ERROR, not crash"
        weight: 0.8
      - id: urdf-ros2-control-tag
        description: "Must include correct URDF <ros2_control> tag with joints and interfaces"
        weight: 0.8
      - id: controller-config
        description: "Must configure joint_trajectory_controller and joint_state_broadcaster"
        weight: 0.8
    timeout: 70000
    tags: [ros2_control, hardware_interface, serial, lifecycle]

  - name: system-bringup
    description: >
      Validates that the skill designs a headless robot bringup with persistent
      udev device naming, ordered systemd units, a topic-level watchdog, and
      graph-level boot health verification.
    prompt: prompts/system-bringup.md
    expected: expected/system-bringup.md
    criteria:
      - id: udev-persistent-naming
        description: "Must write udev rules with SYMLINK for persistent device naming"
        weight: 1.0
      - id: systemd-ordering
        description: "Must order systemd units with After/Wants on network-online.target"
        weight: 1.0
      - id: heartbeat-watchdog
        description: "Must design a heartbeat watchdog using DEADLINE or LIVELINESS QoS events"
        weight: 1.0
      - id: boot-health-check
        description: "Must verify bringup health at the graph level (node list, topic data flow)"
        weight: 0.8
    timeout: 60000
    tags: [bringup, udev, systemd, watchdog, deployment]

  - name: estop-safety
    description: >
      Validates that the skill designs a fail-safe software e-stop: heartbeat
      with DEADLINE QoS, twist_mux command arbitration, SROS2 isolation of the
      safety topics, and latched reset semantics alongside a hardware chain.
    prompt: prompts/estop-safety.md
    expected: expected/estop-safety.md
    criteria:
      - id: failsafe-heartbeat
        description: "Must design a fail-safe e-stop heartbeat with DEADLINE QoS (silence stops the robot)"
        weight: 1.0
      - id: command-arbitration
        description: "Must arbitrate command topics through twist_mux with an e-stop lock priority"
        weight: 1.0
      - id: sros2-isolation
        description: "Must restrict publish permission on safety topics to the supervisor enclave via SROS2"
        weight: 1.0
      - id: hardware-chain
        description: "Must keep a hardware e-stop chain — software stop is not safety-rated"
        weight: 0.8
    timeout: 60000
    tags: [safety, estop, sros2, qos, twist_mux]

  - name: sensor-integration
    description: >
      Validates that the skill integrates real camera/LiDAR hardware: sensor-data
      QoS and optical frames, PTP/chrony clock sync, tf2 MessageFilter
      synchronization, and LiDAR-camera extrinsic calibration with re-projection
      verification.
    prompt: prompts/sensor-integration.md
    expected: expected/sensor-integration.md
    criteria:
      - id: driver-qos-frames
        description: "Must configure LiDAR and camera drivers with sensor-data QoS and correct frame_id"
        weight: 1.0
      - id: clock-sync
        description: "Must synchronize sensor clocks with PTP or chrony and verify with ros2 topic delay"
        weight: 1.0
      - id: tf2-message-filter
        description: "Must use tf2_ros MessageFilter to synchronize processing with transform availability"
        weight: 1.0
      - id: extrinsic-calibration
        description: "Must calibrate LiDAR-camera extrinsics and verify by re-projection"
        weight: 0.8
    timeout: 60000
    tags: [sensors, lidar, camera, calibration, tf2, time-sync]

# Parity test configuration for deprecation assessment
parity_test:
  enabled: true
  description: >
    Compare skill ON vs skill OFF to measure value-add.
    If delta drops below threshold for 3 consecutive runs,
    the skill becomes a deprecation candidate.
  threshold: 5.0
  consecutive_failures_for_deprecation: 3
  metrics:
    - name: accuracy
      weight: 1.0
    - name: completeness
      weight: 0.8
    - name: actionability
      weight: 0.6
