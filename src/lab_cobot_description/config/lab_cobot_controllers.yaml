# UR5e Gazebo Classic 仿真控制器(gazebo_ros2_control 加载)
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    gripper_position_controller:
      type: position_controllers/JointGroupPositionController
    wheel_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController

gazebo_ros2_control:
  ros__parameters:
    # Humble gazebo_ros2_control position-interface PID. Moderate gains hold
    # the arm under gravity without exciting Gazebo contacts.
    pid_gains:
      position:
        ur_shoulder_pan_joint: {kp: 200.0, kd: 20.0, ki: 1.0, max_integral_error: 10.0}
        ur_shoulder_lift_joint: {kp: 400.0, kd: 40.0, ki: 4.0, max_integral_error: 10.0}
        ur_elbow_joint: {kp: 300.0, kd: 30.0, ki: 3.0, max_integral_error: 10.0}
        ur_wrist_1_joint: {kp: 100.0, kd: 10.0, ki: 1.0, max_integral_error: 5.0}
        ur_wrist_2_joint: {kp: 100.0, kd: 10.0, ki: 1.0, max_integral_error: 5.0}
        ur_wrist_3_joint: {kp: 100.0, kd: 10.0, ki: 1.0, max_integral_error: 5.0}

joint_trajectory_controller:

  ros__parameters:
    joints:
      - ur_shoulder_pan_joint
      - ur_shoulder_lift_joint
      - ur_elbow_joint
      - ur_wrist_1_joint
      - ur_wrist_2_joint
      - ur_wrist_3_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    # Humble joint_trajectory_controller goal tolerances.  The controller must
    # not report SUCCEEDED while Gazebo joints are still following the final
    # waypoint; MoveIt validates the next trajectory against that real state.
    constraints:
      goal_time: 5.0
      stopped_velocity_tolerance: 0.02
      ur_shoulder_pan_joint: {trajectory: 0.10, goal: 0.005}
      ur_shoulder_lift_joint: {trajectory: 0.10, goal: 0.005}
      ur_elbow_joint: {trajectory: 0.10, goal: 0.005}
      ur_wrist_1_joint: {trajectory: 0.10, goal: 0.005}
      ur_wrist_2_joint: {trajectory: 0.10, goal: 0.005}
      ur_wrist_3_joint: {trajectory: 0.10, goal: 0.005}

gripper_position_controller:
  ros__parameters:
    joints:
      - gripper_left_finger_joint
      - gripper_right_finger_joint

wheel_velocity_controller:
  ros__parameters:
    joints:
      - front_left_joint
      - front_right_joint
      - back_left_joint
      - back_right_joint
